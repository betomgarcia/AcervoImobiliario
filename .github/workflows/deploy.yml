# CI/CD — Acervo Imobiliário
#
# Gatilhos:
#   push develop  → validate + deploy-dev  (environment: development)
#   push tag v*   → validate + deploy-prd  (environment: production, aprovação manual)
#
# Secrets por environment (development / production):
#   VERCEL_PROJECT_ID, RAILWAY_TOKEN, RAILWAY_SERVICE_ID_API  (nome ou ID do serviço, ex.: acervo-api)
# Variables por environment:
#   RAILWAY_ENVIRONMENT, VITE_API_BASE_URL
# Secrets do repositório:
#   VERCEL_TOKEN, VERCEL_ORG_ID
#
# Frontend → Vercel (vercel pull + vercel deploy; build na infra Vercel) | API → Railway | MongoDB → Atlas

name: Deploy

on:
  push:
    branches:
      - develop
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: AcervoImobiliario.Web/package-lock.json

      - name: Install frontend dependencies
        working-directory: AcervoImobiliario.Web
        run: npm ci

      - name: Build frontend
        working-directory: AcervoImobiliario.Web
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore backend
        run: dotnet restore AcervoImobiliario.sln

      - name: Build backend
        run: dotnet build AcervoImobiliario.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test AcervoImobiliario.sln --configuration Release --no-build --verbosity normal

  deploy-dev:
    name: Deploy DEV
    needs: validate
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel settings
        working-directory: .
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel
        working-directory: .
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy API to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE_ID_API }}
          RAILWAY_ENV: ${{ vars.RAILWAY_ENVIRONMENT }}
        run: railway up --service "$RAILWAY_SERVICE" --environment "$RAILWAY_ENV" --detach

      - name: Verify API health
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          curl --fail --show-error --silent "$API_BASE_URL/health"
          curl --fail --show-error --silent "$API_BASE_URL/health/ready"

  deploy-prd:
    name: Deploy PRD
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel settings
        working-directory: .
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel
        working-directory: .
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy API to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE_ID_API }}
          RAILWAY_ENV: ${{ vars.RAILWAY_ENVIRONMENT }}
        run: railway up --service "$RAILWAY_SERVICE" --environment "$RAILWAY_ENV" --detach

      - name: Verify API health
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          curl --fail --show-error --silent "$API_BASE_URL/health"
          curl --fail --show-error --silent "$API_BASE_URL/health/ready"
